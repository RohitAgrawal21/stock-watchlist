name: Update stock site

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 18:30 IST, daily after NSE close
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches: [main]        # publishes the committed page instantly (no re-scrape)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Only re-scrape on the daily schedule or a manual run. On a normal push
      # the committed docs/index.html is already fresh, so we publish it as-is
      # (fast, ~20s, and no chance of overlapping runs cancelling each other).
      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements-site.txt
      - name: Scrape + build static site
        if: github.event_name != 'push'
        run: python build_site.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
